<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Checkout - Greeshma Dairy</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("ghee.jpg");
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.55);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:90%;
max-width:420px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-top:0;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:14px;
background:#25D366;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<h2>Customer Details</h2>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="order()">Place Order</button>

</div>

</div>

<script>

function order(){

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let address=document.getElementById("address").value.trim()

if(name=="" || phone=="" || address==""){

alert("Please fill all customer details")

return

}

if(phone.length<10){

alert("Please enter a valid phone number")

return

}

let q1=localStorage.getItem("250")
let q2=localStorage.getItem("500")
let q3=localStorage.getItem("1000")

let message="Hello, I want to order Greeshma Dairy Ghee\n\n"

if(q1>0) message+="250g x "+q1+"\n"
if(q2>0) message+="500g x "+q2+"\n"
if(q3>0) message+="1kg x "+q3+"\n"

message+="\nName: "+name
message+="\nPhone: "+phone
message+="\nAddress: "+address

let url="https://wa.me/917032540046?text="+encodeURIComponent(message)

window.open(url)

}

</script>

</body>

</html>
