<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Greeshma Dairy</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-image:url("ghee.jpg");
background-size:cover;
background-position:center;
min-height:100vh;
}

/* Dark overlay */

.overlay{
background:rgba(0,0,0,0.35);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* Title */

.title{
text-align:center;
color:white;
margin-top:60px;
}

.title h1{
font-size:60px;
margin:0;
}

.tagline{
font-size:22px;
margin-top:10px;
}

/* Main layout */

.container{
width:100%;
max-width:1200px;
display:flex;
align-items:center;
justify-content:flex-start;
padding:40px;
box-sizing:border-box;
}

/* Order box */

.order-box{

background:rgba(255,255,255,0.8);
backdrop-filter:blur(8px);

padding:35px;
border-radius:18px;

width:380px;

box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.order-box h2{
margin-top:0;
}

/* Inputs */

input, select, textarea{

width:100%;
padding:12px;
margin:8px 0;

border-radius:8px;
border:1px solid #ccc;

font-size:16px;
box-sizing:border-box;
}

/* Button */

button{

width:100%;
padding:14px;

background:#25D366;
color:white;

border:none;
border-radius:8px;

font-size:18px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

/* Contact box */

.contact{

position:fixed;
bottom:20px;
right:20px;

background:white;
padding:12px 18px;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

.contact strong{
color:#f7941d;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

.title h1{
font-size:36px;
}

.tagline{
font-size:18px;
}

.container{
justify-content:center;
padding:20px;
}

.order-box{
width:100%;
max-width:420px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="title">

<h1>Greeshma Dairy</h1>

<div class="tagline">
Fresh | Natural | Homemade
</div>

</div>

<div class="container">

<div class="order-box">

<h2>Order Fresh Homemade Ghee</h2>

<input type="text" id="name" placeholder="Customer Name">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<select id="product">
<option value="250g" data-price="225">250g - ₹225</option>
<option value="500g" data-price="450">500g - ₹450</option>
<option value="1kg" data-price="900">1kg - ₹900</option>
</select>

<input type="number" id="quantity" placeholder="Enter Quantity" min="1">

<button onclick="order()">Order on WhatsApp</button>

</div>

</div>

<div class="contact">

<strong>Swathi</strong><br>
📞 917032540046

</div>

</div>

<script>

function order(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var address=document.getElementById("address").value;

var product=document.getElementById("product");
var productName=product.value;
var price=product.options[product.selectedIndex].getAttribute("data-price");

var quantity=document.getElementById("quantity").value;

if(name=="" || phone=="" || address=="" || quantity==""){
alert("Please fill all details");
return;
}

var total=price*quantity;

var message="Hello, I want to order Ghee.%0A%0A"+
"Name: "+name+
"%0APhone: "+phone+
"%0AAddress: "+address+
"%0A%0AProduct: "+productName+
"%0AQuantity: "+quantity+
"%0ATotal Price: ₹"+total;

var owner="917032540046";

var url="https://wa.me/"+owner+"?text="+message;

window.open(url,'_blank');

}

</script>

</body>

</html>
