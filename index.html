<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Greeshma Dairy</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("ghee.jpg");
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.55);
min-height:100vh;
}

header{
text-align:center;
color:white;
padding:40px;
}

header h1{
margin:0;
font-size:48px;
}

.tagline{
font-size:18px;
margin-top:10px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
font-weight:bold;
font-size:20px;
margin:10px 0;
}

input{
width:100%;
padding:10px;
margin-top:5px;
}

.checkout{
text-align:center;
margin-top:30px;
}

button{
padding:14px 30px;
background:#ff5722;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="overlay">

<header>

<h1>Greeshma Dairy</h1>
<div class="tagline">Fresh | Natural | Homemade</div>

</header>

<div class="container">

<div class="products">

<div class="card">
<img src="ghee250.jpg">
<h3>Homemade Ghee 250g</h3>
<div class="price">₹225</div>
<input type="number" id="q1" min="0" placeholder="Quantity">
</div>

<div class="card">
<img src="ghee500.jpg">
<h3>Homemade Ghee 500g</h3>
<div class="price">₹450</div>
<input type="number" id="q2" min="0" placeholder="Quantity">
</div>

<div class="card">
<img src="ghee1kg.jpg">
<h3>Homemade Ghee 1kg</h3>
<div class="price">₹900</div>
<input type="number" id="q3" min="0" placeholder="Quantity">
</div>

</div>

<div class="checkout">
<button onclick="checkout()">Proceed to Checkout</button>
</div>

</div>

</div>

<script>

function checkout(){

let q1=document.getElementById("q1").value || 0
let q2=document.getElementById("q2").value || 0
let q3=document.getElementById("q3").value || 0

if(q1==0 && q2==0 && q3==0){

alert("Please select at least one product")

return

}

localStorage.setItem("250",q1)
localStorage.setItem("500",q2)
localStorage.setItem("1000",q3)

window.location="checkout.html"

}

</script>

</body>

</html>
